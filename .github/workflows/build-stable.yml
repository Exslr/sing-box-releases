name: Build sing-box stable (Windows, Linux, Darwin)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag or temporary tag when building from commit hash (e.g. 1.13.0-rc.4)'
        required: true
      commit_hash:
        description: 'Optional commit hash to build from (overrides version tag)'
        required: false
        default: ''
      publish_release:
        description: 'Publish type after build'
        required: false
        type: choice
        options:
          - none
          - pre-release
          - release
        default: none
      build_cli:
        description: 'Build CLI'
        required: false
        type: boolean
        default: true

env:
  GO_VERSION: '~1.25.11'
  GO_VERSION_DARWIN: '^1.25.3'
  TAGS_COMMON: 'with_gvisor,with_quic,with_wireguard,with_utls,with_clash_api,badlinkname,tfogo_checklinkname0,with_tailscale'
  TAGS_CLI_EXTRA: 'with_dhcp,with_acme,with_ccm,with_ocm'

jobs:
  build_cli:
    if: ${{ github.event.inputs.build_cli == 'true' }}
    name: Build CLI ${{ matrix.platform }}-${{ matrix.arch }} ${{ matrix.variant }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: arm64
            os: ubuntu-latest
            goos: linux
            goarch: arm64
            goamd64: ''
            binary: sing-box
            extra_tags: ',with_purego'
            variant: purego
            artifact_name: binary-linux-arm64-purego
            naive: true
          - platform: linux
            arch: arm64
            os: ubuntu-latest
            goos: linux
            goarch: arm64
            goamd64: ''
            binary: sing-box
            extra_tags: ''
            variant: glibc
            artifact_name: binary-linux-arm64-glibc
            cgo: '1'
            naive: true
          - platform: linux
            arch: arm64
            os: ubuntu-latest
            goos: linux
            goarch: arm64
            goamd64: ''
            binary: sing-box
            extra_tags: ',with_musl'
            variant: musl
            artifact_name: binary-linux-arm64-musl
            cgo: '1'
            naive: true
          - platform: linux
            arch: amd64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            goamd64: v1
            binary: sing-box
            extra_tags: ',with_purego'
            variant: purego
            artifact_name: binary-linux-amd64-purego
            naive: true
          - platform: linux
            arch: amd64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            goamd64: v1
            binary: sing-box
            extra_tags: ''
            variant: glibc
            artifact_name: binary-linux-amd64-glibc
            cgo: '1'
            naive: true
          - platform: linux
            arch: amd64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            goamd64: v1
            binary: sing-box
            extra_tags: ',with_musl'
            variant: musl
            artifact_name: binary-linux-amd64-musl
            cgo: '1'
            naive: true
          - platform: linux
            arch: amd64v3
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            goamd64: v3
            binary: sing-box
            extra_tags: ',with_purego'
            variant: purego
            artifact_name: binary-linux-amd64v3-purego
            naive: true
          - platform: linux
            arch: amd64v3
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            goamd64: v3
            binary: sing-box
            extra_tags: ''
            variant: glibc
            artifact_name: binary-linux-amd64v3-glibc
            cgo: '1'
            naive: true
          - platform: linux
            arch: amd64v3
            os: ubuntu-latest
            goos: linux
            goarch: amd64
            goamd64: v3
            binary: sing-box
            extra_tags: ',with_musl'
            variant: musl
            artifact_name: binary-linux-amd64v3-musl
            cgo: '1'
            naive: true
          - platform: windows
            arch: arm64
            os: windows-latest
            goos: windows
            goarch: arm64
            goamd64: ''
            binary: sing-box.exe
            extra_tags: ',with_purego'
            variant: purego
            artifact_name: binary-windows-arm64
            naive: true
          - platform: windows
            arch: amd64
            os: windows-latest
            goos: windows
            goarch: amd64
            goamd64: v1
            binary: sing-box.exe
            extra_tags: ',with_purego'
            variant: purego
            artifact_name: binary-windows-amd64
            naive: true
          - platform: windows
            arch: amd64v3
            os: windows-latest
            goos: windows
            goarch: amd64
            goamd64: v3
            binary: sing-box.exe
            extra_tags: ',with_purego'
            variant: purego
            artifact_name: binary-windows-amd64v3
            naive: true
          - platform: darwin
            arch: arm64
            os: macos-latest
            goos: darwin
            goarch: arm64
            goamd64: ''
            binary: sing-box
            extra_tags: ''
            artifact_name: binary-darwin-arm64
            cgo: '1'
            naive: true
          - platform: darwin
            arch: amd64
            os: macos-latest
            goos: darwin
            goarch: amd64
            goamd64: v1
            binary: sing-box
            extra_tags: ''
            artifact_name: binary-darwin-amd64
            cgo: '1'
            naive: true
          - platform: darwin
            arch: amd64v3
            os: macos-latest
            goos: darwin
            goarch: amd64
            goamd64: v3
            binary: sing-box
            extra_tags: ''
            artifact_name: binary-darwin-amd64v3
            cgo: '1'
            naive: true
    steps:
      - name: Setup Go for Darwin
        if: matrix.platform == 'darwin'
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION_DARWIN }}
          cache: false

      - name: Setup Go
        if: matrix.platform != 'darwin'
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Checkout sing-box
        uses: actions/checkout@v6
        with:
          repository: Exslr/sing-box
          ref: ${{ github.event.inputs.commit_hash != '' && github.event.inputs.commit_hash || format('v{0}', github.event.inputs.version) }}
          path: sing-box
          fetch-depth: 0

      - name: Recreate temporary tag
        if: github.event.inputs.commit_hash != ''
        shell: bash
        run: |
          set -xeuo pipefail
          cd sing-box
          TAG="v${{ github.event.inputs.version }}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            git tag -d "${TAG}"
          fi
          git tag "${TAG}" "${{ github.event.inputs.commit_hash }}"

      - name: Clone cronet-go
        if: matrix.variant == 'glibc' || matrix.variant == 'musl' || matrix.variant == 'purego'
        shell: bash
        run: |
          set -xeuo pipefail
          CRONET_GO_VERSION=$(cat sing-box/.github/CRONET_GO_VERSION)
          git init ~/cronet-go
          git -C ~/cronet-go remote add origin https://github.com/sagernet/cronet-go.git
          git -C ~/cronet-go fetch --depth=1 origin "$CRONET_GO_VERSION"
          git -C ~/cronet-go checkout FETCH_HEAD
          git -C ~/cronet-go submodule update --init --recursive --depth=1

      - name: Regenerate Debian keyring
        if: matrix.variant == 'glibc' || matrix.variant == 'musl'
        shell: bash
        run: |
          set -xeuo pipefail
          rm -f ~/cronet-go/naiveproxy/src/build/linux/sysroot_scripts/keyring.gpg
          cd ~/cronet-go
          GPG_TTY=/dev/null ./naiveproxy/src/build/linux/sysroot_scripts/generate_keyring.sh

      - name: Cache Chromium toolchain
        if: matrix.variant == 'glibc' || matrix.variant == 'musl'
        id: cache-chromium-toolchain
        uses: actions/cache@v5
        with:
          path: |
            ~/cronet-go/naiveproxy/src/third_party/llvm-build/
            ~/cronet-go/naiveproxy/src/gn/out/
            ~/cronet-go/naiveproxy/src/chrome/build/pgo_profiles/
            ~/cronet-go/naiveproxy/src/out/sysroot-build/
          key: chromium-toolchain-${{ matrix.goarch }}-${{ matrix.variant }}-${{ hashFiles('sing-box/.github/CRONET_GO_VERSION') }}

      - name: Download Chromium toolchain
        if: matrix.variant == 'glibc' || matrix.variant == 'musl'
        shell: bash
        run: |
          set -xeuo pipefail
          cd ~/cronet-go
          if [[ "${{ matrix.variant }}" == "musl" ]]; then
            go run ./cmd/build-naive --target=linux/${{ matrix.goarch }} --libc=musl download-toolchain
          else
            go run ./cmd/build-naive --target=linux/${{ matrix.goarch }} download-toolchain
          fi

      - name: Set Chromium toolchain environment
        if: matrix.variant == 'glibc' || matrix.variant == 'musl'
        shell: bash
        run: |
          set -xeuo pipefail
          cd ~/cronet-go
          if [[ "${{ matrix.variant }}" == "musl" ]]; then
            go run ./cmd/build-naive --target=linux/${{ matrix.goarch }} --libc=musl env >> $GITHUB_ENV
          else
            go run ./cmd/build-naive --target=linux/${{ matrix.goarch }} env >> $GITHUB_ENV
          fi

      - name: Compute build environment
        id: env
        shell: bash
        run: |
          TAGS="${TAGS_COMMON},${TAGS_CLI_EXTRA}${{ matrix.extra_tags }}"
          ARCHIVE_SUFFIX=""

          if [[ "${{ matrix.naive }}" == "true" ]]; then
            TAGS="${TAGS},with_naive_outbound"
          fi

          case "${{ matrix.variant }}" in
            'glibc')
              ARCHIVE_SUFFIX="-glibc"
              ;;
            'musl')
              ARCHIVE_SUFFIX="-musl"
              ;;
          esac
          if [[ "${{ matrix.variant }}" == "purego" && "${{ matrix.platform }}" == "linux" ]]; then
              ARCHIVE_SUFFIX="-purego"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "archive_suffix=${ARCHIVE_SUFFIX}" >> "$GITHUB_OUTPUT"

          echo "--- Build Environment ---"
          echo "Platform: ${{ matrix.platform }}"
          echo "Arch: ${{ matrix.arch }}"
          echo "Tags: ${TAGS}"
          echo "Archive suffix: ${ARCHIVE_SUFFIX}"

      - name: Build
        shell: bash
        run: |
          set -xeuo pipefail
          cd sing-box
          mkdir -p dist
          go build -v -trimpath -o "dist/${{ matrix.binary }}" \
            -tags "${{ steps.env.outputs.tags }}" \
            -ldflags '-s -buildid= -X github.com/sagernet/sing-box/constant.Version=${{ github.event.inputs.version }} -X internal/godebug.defaultGODEBUG=multipathtcp=0 -checklinkname=0' \
            ./cmd/sing-box
        env:
          CGO_ENABLED: ${{ matrix.cgo || '0' }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOAMD64: ${{ matrix.goamd64 }}

      - name: Extract libcronet.so
        if: matrix.variant == 'purego' && matrix.platform == 'linux'
        shell: bash
        run: |
          cd ~/cronet-go
          CGO_ENABLED=0 go run -v ./cmd/build-naive extract-lib --target linux/${{ matrix.goarch }} -o "$GITHUB_WORKSPACE/sing-box/dist"

      - name: Extract libcronet.dll
        if: matrix.variant == 'purego' && matrix.platform == 'windows'
        shell: bash
        run: |
          cd ~/cronet-go
          CGO_ENABLED=0 go run -v ./cmd/build-naive extract-lib --target windows/${{ matrix.goarch }} -o "$GITHUB_WORKSPACE/sing-box/dist"

      - name: Archive (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          cd sing-box/dist
          DIR_NAME="sing-box-${{ github.event.inputs.version }}-linux-${{ matrix.arch }}${{ steps.env.outputs.archive_suffix }}"
          mkdir -p "$DIR_NAME"
          cp ../LICENSE "$DIR_NAME/"
          cp sing-box "$DIR_NAME/"
          if [ -f libcronet.so ]; then
              cp libcronet.so "${DIR_NAME}"
          fi
          tar -czvf "$DIR_NAME.tar.gz" "$DIR_NAME"
          rm -rf "$DIR_NAME" sing-box
          if [ -f libcronet.so ]; then rm -f libcronet.so; fi

      - name: Archive (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          cd sing-box/dist
          $DIR_NAME = "sing-box-${{ github.event.inputs.version }}-windows-${{ matrix.arch }}"
          mkdir "$DIR_NAME"
          Copy-Item ../LICENSE "$DIR_NAME/"
          Copy-Item sing-box.exe "$DIR_NAME/"
          if (Test-Path libcronet.dll) {
              Copy-Item libcronet.dll "$DIR_NAME/"
          }
          Compress-Archive -Path "$DIR_NAME" -DestinationPath "$DIR_NAME.zip"
          Remove-Item -Recurse "$DIR_NAME"
          Remove-Item sing-box.exe
          if (Test-Path libcronet.dll) { Remove-Item libcronet.dll }

      - name: Archive (Darwin)
        if: matrix.platform == 'darwin'
        run: |
          cd sing-box/dist
          DIR_NAME="sing-box-${{ github.event.inputs.version }}-darwin-${{ matrix.arch }}"
          mkdir -p "$DIR_NAME"
          cp ../LICENSE "$DIR_NAME/"
          cp sing-box "$DIR_NAME/"
          tar -czvf "$DIR_NAME.tar.gz" "$DIR_NAME"
          rm -rf "$DIR_NAME" sing-box

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: sing-box/dist/*

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build_cli]
    if: ${{ always() && github.event.inputs.publish_release != 'none' && github.event.inputs.build_cli == 'true' && needs.build_cli.result == 'success' }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Compute release version and tag
        id: release_tag
        run: |
          DISPLAY_VERSION="$(echo "${{ github.event.inputs.version }}" | sed 's/reF1nd/Exslr/g')"
          RELEASE_TAG="v${DISPLAY_VERSION}"
          echo "version=${DISPLAY_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Display version: ${DISPLAY_VERSION}"
          echo "Release tag: ${RELEASE_TAG}"

      - name: Generate stable-build-info.json
        run: |
          jq \
            --arg version "${{ steps.release_tag.outputs.version }}" \
            --arg built_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg run_id "${{ github.run_id }}" \
            '.version = $version | .built_at = $built_at | .run_id = $run_id' \
            stable-build-info.json > updated-stable-build-info.json
          mv updated-stable-build-info.json stable-build-info.json

          VERSION=$(jq -r '.version' stable-build-info.json)
          BUILT_AT=$(jq -r '.built_at' stable-build-info.json)
          RUN_ID=$(jq -r '.run_id' stable-build-info.json)

          {
            echo "## sing-box v${VERSION}"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Version | \`${VERSION}\` |"
            echo "| sing-box Branch | [\`reF1nd-stable\`](https://github.com/Exslr/sing-box/tree/reF1nd-stable) |"
            echo "| Built At | ${BUILT_AT} |"
            echo "| Run ID | [${RUN_ID}](https://github.com/${{ github.repository }}/actions/runs/${RUN_ID}) |"
          } > release-notes.md

      - name: Commit updated build-info
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stable-build-info.json
          git commit -m "Release ${{ steps.release_tag.outputs.tag }}"
          git pull --rebase
          git push

      - name: Delete existing tag and release if exists
        run: |
          TAG="${{ steps.release_tag.outputs.tag }}"
          RELEASE_ID=$(gh release view "$TAG" --json id -q '.id' 2>/dev/null || true)
          if [ -n "$RELEASE_ID" ]; then
            gh release delete "$TAG" --yes
          fi
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            git push origin ":refs/tags/$TAG"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect release files
        run: |
          mkdir -p release_files
          find artifacts -type f | while read -r f; do
            cp "$f" release_files/
          done

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.tag }}
          prerelease: ${{ github.event.inputs.publish_release == 'pre-release' }}
          body_path: release-notes.md
          files: release_files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
